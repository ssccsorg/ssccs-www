name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "src/**"
      - "static/**"
      - "sidebars.js"
      - "docusaurus.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-cf-pages.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "docs/**"
      - "src/**"
      - "static/**"
      - "sidebars.js"
      - "docusaurus.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-cf-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus site
        run: npm run build

  deploy:
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_PAGES_DEPLOY }}
          command: pages deploy build/ --project-name=ssccs-www
