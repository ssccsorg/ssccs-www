name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "src/**"
      - "static/**"
      - "sidebars.js"
      - "docusaurus.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-cf-pages.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "docs/**"
      - "src/**"
      - "static/**"
      - "sidebars.js"
      - "docusaurus.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-cf-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build Docusaurus site
        run: npm run build

  deploy:
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Compute cache key
        id: cache-key
        run: |
          find docs src static sidebars.js docusaurus.config.js package.json package-lock.json \
            -type f | sort | xargs sha256sum | sha256sum | cut -d' ' -f1 > /tmp/cache_key.txt
          echo "key=$(cat /tmp/cache_key.txt)" >> $GITHUB_OUTPUT

      - name: Cache Docusaurus build artifacts
        uses: actions/cache@v5
        with:
          path: |
            .docusaurus
          key: ${{ runner.os }}-docusaurus-${{ steps.cache-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-docusaurus-

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build Docusaurus site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_PAGES_DEPLOY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler pages deploy build/ --project-name=ssccs-www
